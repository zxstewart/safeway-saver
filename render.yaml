services:
  - type: web
    name: safeway-saver
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safeway-saver-db
          property: connectionString
      - key: FLIPP_TOKEN
        value: 7749fa974b9869e8f57606ac9477decf

databases:
  - name: safeway-saver-db
    plan: free
